<style>
  :root{
    --bg:#EEF3F4; --card:#FFFFFF; --ink:#12303A; --muted:#5C7982;
    --teal:#0E7C7B; --teal-2:#13A8A0; --teal-ink:#0A5250;
    --ok:#158F5A; --ok-bg:#E4F5EC; --warn:#D84A2C; --warn-bg:#FCEAE4;
    --line:#DCE6E8; --shadow:0 10px 40px rgba(14,60,66,.12);
    --font:'Pretendard','Pretendard Variable',-apple-system,BlinkMacSystemFont,system-ui,'Malgun Gothic',sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:var(--font); background:var(--bg); color:var(--ink);
    line-height:1.6; letter-spacing:-.01em;
    padding-bottom:88px; min-height:100vh;
    background-image:radial-gradient(1200px 400px at 50% -8%, rgba(19,168,160,.14), transparent 70%);
  }
  .wrap{max-width:600px;margin:0 auto;padding:20px 18px 40px}

  /* Header */
  header{display:flex;align-items:center;gap:10px;padding:6px 2px 18px}
  .pulse{width:34px;height:20px;flex:none}
  .pulse path{stroke:var(--teal);stroke-width:2.4;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .brand{font-weight:800;font-size:15px;color:var(--teal-ink);letter-spacing:-.02em}
  .brand small{display:block;font-weight:600;font-size:11.5px;color:var(--muted);letter-spacing:0}

  .card{background:var(--card);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow)}

  /* Intro */
  .intro{padding:30px 24px 26px;text-align:center}
  .kicker{display:inline-block;font-size:12px;font-weight:700;color:var(--teal);background:rgba(19,168,160,.12);
    padding:6px 12px;border-radius:999px;letter-spacing:.02em}
  h1{font-size:27px;line-height:1.28;margin:16px 0 8px;font-weight:800;letter-spacing:-.03em}
  h1 .hl{color:var(--teal-ink);position:relative;white-space:nowrap}
  h1 .hl::after{content:"";position:absolute;left:-2px;right:-2px;bottom:2px;height:9px;background:rgba(19,168,160,.22);z-index:-1;border-radius:3px}
  .sub{color:var(--muted);font-size:15px;margin:0 auto;max-width:420px}
  .chips{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin:20px 0 6px}
  .chip{font-size:12.5px;font-weight:600;color:var(--teal-ink);background:#EAF6F5;border:1px solid #CDE8E5;
    padding:6px 11px;border-radius:999px}
  .disclaim{margin-top:20px;font-size:12px;color:var(--muted);background:#F4F8F8;border:1px dashed var(--line);
    border-radius:14px;padding:11px 14px;line-height:1.55}

  .btn{display:block;width:100%;border:none;cursor:pointer;font-family:inherit;font-weight:800;
    border-radius:16px;transition:transform .12s ease, box-shadow .2s ease, background .2s}
  .btn:active{transform:translateY(1px) scale(.995)}
  .btn-primary{background:linear-gradient(135deg,var(--teal) 0%,var(--teal-2) 100%);color:#fff;
    font-size:17px;padding:17px;margin-top:22px;box-shadow:0 8px 22px rgba(14,124,123,.32)}
  .btn-primary:focus-visible{outline:3px solid var(--teal-2);outline-offset:2px}

  /* Quiz */
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding:0 4px}
  .qcount{font-size:13.5px;font-weight:700;color:var(--muted)}
  .qcount b{color:var(--teal-ink);font-size:16px}
  .score-pill{font-size:13px;font-weight:800;color:var(--teal-ink);background:#EAF6F5;border:1px solid #CDE8E5;padding:5px 12px;border-radius:999px}
  .bar{height:8px;background:#E2ECEE;border-radius:99px;overflow:hidden;margin:0 4px 20px}
  .bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--teal),var(--teal-2));border-radius:99px;transition:width .4s cubic-bezier(.3,1,.4,1);width:0}

  .qcard{padding:24px 22px 22px}
  .cat{display:inline-block;font-size:11.5px;font-weight:800;color:#fff;background:var(--teal);padding:5px 11px;border-radius:8px;letter-spacing:.01em}
  .qtext{font-size:20px;font-weight:800;line-height:1.42;margin:15px 0 20px;letter-spacing:-.02em}
  .opts{display:flex;flex-direction:column;gap:11px}
  .opt{display:flex;align-items:center;gap:12px;width:100%;text-align:left;cursor:pointer;font-family:inherit;
    background:#F7FAFA;border:1.5px solid var(--line);border-radius:15px;padding:16px 16px;font-size:16px;font-weight:700;color:var(--ink);transition:.15s}
  .opt:hover:not(:disabled){border-color:var(--teal-2);background:#F0F9F8}
  .opt:focus-visible{outline:3px solid var(--teal-2);outline-offset:2px}
  .opt .mk{width:26px;height:26px;flex:none;border-radius:8px;background:#fff;border:1.5px solid var(--line);display:grid;place-items:center;font-size:14px;font-weight:900;color:var(--muted)}
  .opt.correct{border-color:var(--ok);background:var(--ok-bg);color:#0d5a3a}
  .opt.correct .mk{background:var(--ok);border-color:var(--ok);color:#fff}
  .opt.wrong{border-color:var(--warn);background:var(--warn-bg);color:#8f2a15}
  .opt.wrong .mk{background:var(--warn);border-color:var(--warn);color:#fff}
  .opt:disabled{cursor:default}

  .exp{margin-top:16px;border-radius:15px;padding:15px 16px;font-size:14.5px;line-height:1.6;animation:rise .3s ease}
  .exp.good{background:var(--ok-bg);border:1px solid #BEE7CF}
  .exp.bad{background:var(--warn-bg);border:1px solid #F3CDC0}
  .exp .verdict{font-weight:900;font-size:14px;display:block;margin-bottom:5px}
  .exp.good .verdict{color:var(--ok)}
  .exp.bad .verdict{color:var(--warn)}
  .exp .body{color:#2b4952}
  .tag-visit{display:inline-block;margin-top:9px;font-size:12px;font-weight:800;padding:4px 10px;border-radius:8px}
  .tag-visit.hosp{color:#fff;background:var(--warn)}
  .tag-visit.home{color:#0d5a3a;background:#D3EFDF}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  .btn-next{background:var(--teal-ink);color:#fff;font-size:16px;padding:15px;margin-top:16px}
  .btn-next:focus-visible{outline:3px solid var(--teal-2);outline-offset:2px}

  /* Result */
  .result{padding:30px 24px 26px;text-align:center}
  .rscore{font-size:15px;font-weight:700;color:var(--muted)}
  .rbig{font-size:56px;font-weight:900;letter-spacing:-.04em;color:var(--teal-ink);line-height:1;margin:6px 0 2px}
  .rbig span{font-size:26px;color:var(--muted)}
  .rtier{font-size:22px;font-weight:800;margin:16px 0 6px;letter-spacing:-.02em}
  .rmsg{color:#2b4952;font-size:15px;max-width:430px;margin:0 auto}
  .redflag{text-align:left;background:#FFF6F3;border:1px solid #F3CDC0;border-radius:16px;padding:16px 18px;margin:22px 0 4px}
  .redflag h3{margin:0 0 8px;font-size:14px;font-weight:900;color:var(--warn);display:flex;align-items:center;gap:7px}
  .redflag ul{margin:0;padding-left:18px;color:#7a3423;font-size:13.5px;line-height:1.7}
  .btn-retry{background:#EAF6F5;color:var(--teal-ink);border:1.5px solid #CDE8E5;font-size:15px;padding:14px;margin-top:18px}
  .btn-retry:focus-visible{outline:3px solid var(--teal-2);outline-offset:2px}
  .foot-note{font-size:11.5px;color:var(--muted);margin-top:18px;line-height:1.55}

  /* Hospital intro (result) */
  .clinic{margin-top:16px;text-align:left;border:1px solid var(--line);border-radius:20px;overflow:hidden;box-shadow:0 6px 20px rgba(14,60,66,.08)}
  .clinic-hd{background:linear-gradient(135deg,var(--teal) 0%,var(--teal-2) 100%);color:#fff;padding:18px 20px}
  .clinic-hd .cn{font-size:19px;font-weight:900;letter-spacing:-.02em}
  .clinic-hd .cs{font-size:12.5px;font-weight:600;color:rgba(255,255,255,.9);margin-top:3px}
  .clinic-bd{background:#fff;padding:18px 20px 20px}
  .clinic-slogan{font-size:14.5px;font-weight:700;color:var(--teal-ink);line-height:1.5;margin:0 0 14px}
  .clinic-sec-t{font-size:11.5px;font-weight:800;color:var(--muted);letter-spacing:.03em;margin:14px 0 8px}
  .clinic-chips{display:flex;flex-wrap:wrap;gap:7px}
  .clinic-chips span{font-size:12.5px;font-weight:700;color:var(--teal-ink);background:#EAF6F5;border:1px solid #CDE8E5;padding:5px 10px;border-radius:9px}
  .clinic-info{margin-top:6px;border-top:1px dashed var(--line);padding-top:14px;display:flex;flex-direction:column;gap:11px}
  .clinic-row{display:flex;gap:10px;font-size:13.5px;line-height:1.5;color:#2b4952}
  .clinic-row .ic{flex:none;font-size:15px;width:22px;text-align:center}
  .clinic-row b{color:var(--ink);font-weight:800}
  .clinic-row a{color:var(--teal-ink);font-weight:800;text-decoration:none;border-bottom:1.5px solid rgba(14,124,123,.3)}
  .clinic-cta{display:flex;gap:10px;margin-top:16px}
  .clinic-cta a{flex:1;text-align:center;text-decoration:none;font-weight:800;font-size:15px;padding:14px 10px;border-radius:14px;transition:transform .12s}
  .clinic-cta a:active{transform:translateY(1px)}
  .cta-call{background:#EAF6F5;color:var(--teal-ink);border:1.5px solid #CDE8E5}
  .cta-book{background:linear-gradient(135deg,var(--teal) 0%,var(--teal-2) 100%);color:#fff;box-shadow:0 6px 16px rgba(14,124,123,.3)}
  .clinic-cta a:focus-visible{outline:3px solid var(--teal-2);outline-offset:2px}

  /* Fixed booking banner */
  .banner{position:fixed;left:0;right:0;bottom:0;z-index:50;
    background:linear-gradient(135deg,var(--teal) 0%,var(--teal-2) 100%);
    box-shadow:0 -6px 24px rgba(14,60,66,.22);padding:12px 16px calc(12px + env(safe-area-inset-bottom))}
  .banner a{max-width:600px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px;text-decoration:none;color:#fff}
  .banner .bt{font-weight:800;font-size:15px;line-height:1.35}
  .banner .bt small{display:block;font-weight:600;font-size:11.5px;color:rgba(255,255,255,.85)}
  .banner .go{flex:none;background:#fff;color:var(--teal-ink);font-weight:900;font-size:14px;padding:11px 18px;border-radius:12px;white-space:nowrap;box-shadow:0 4px 12px rgba(0,0,0,.15)}
  .banner a:active .go{transform:translateY(1px)}

  @media (max-width:400px){ h1{font-size:24px} .qtext{font-size:18px} .rbig{font-size:48px} }
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>

<script>

   e: 해설 (병원 방문 vs 자가관리 안내 포함) */
const OX = ["⭕ 맞다","❌ 틀리다"];
const BANK = [
/* 허리 */
{c:"허리",q:"갑자기 삐끗한 허리 통증은 대부분 며칠~2주 안에 좋아진다.",o:OX,a:0,v:"home",e:"급성 요통의 상당수는 근육·인대 문제로 자연 호전됩니다. 다만 2주 넘게 지속되거나 다리로 뻗치면 진료를 받아보세요."},
{c:"허리",q:"허리 디스크가 있으면 무조건 수술을 해야 한다.",o:OX,a:1,v:"home",e:"대부분은 약물·주사·재활 등 비수술 치료로 호전됩니다. 수술은 일부 경우에만 고려합니다."},
{c:"허리",q:"허리가 아프면 며칠간 꼼짝 않고 침대에 누워 절대안정하는 게 가장 좋다.",o:OX,a:1,v:"home",e:"장기간 절대안정은 오히려 회복을 늦춥니다. 견딜 수 있는 범위에서 활동을 유지하는 편이 좋습니다."},
{c:"허리",q:"다리가 찌릿하게 뻗치고 발·발가락에 힘이 빠지면 병원 진료가 필요하다.",o:OX,a:0,v:"hosp",e:"방사통+근력저하는 신경 압박 신호일 수 있습니다. 자가관리보다 진료가 우선입니다."},
{c:"허리",q:"허리 통증과 함께 소변·대변 조절이 안 되면 응급실에 가야 한다.",o:OX,a:0,v:"hosp",e:"마미증후군 등이 의심되는 응급 신호입니다. 지체 없이 병원으로 가세요."},
{c:"허리",q:"급성 요통 초기엔 냉찜질, 며칠 지난 뒤엔 온찜질이 도움이 될 수 있다.",o:OX,a:0,v:"home",e:"초기 냉찜질로 붓기·통증을 줄이고, 이후 온찜질로 뭉친 근육을 풀어주는 방식이 흔히 권장됩니다."},
{c:"허리",q:"무거운 물건은 허리를 굽혀서 드는 게 안전하다.",o:OX,a:1,v:"know",e:"무릎을 굽히고 물건을 몸에 붙여 다리 힘으로 드세요. 허리를 굽혀 들면 부담이 커집니다."},
{c:"허리",q:"오래 앉아 있는 자세는 허리 디스크에 부담을 준다.",o:OX,a:0,v:"know",e:"앉은 자세는 서 있을 때보다 디스크 압력이 높습니다. 30~50분마다 일어나 움직이세요."},
{c:"허리",q:"요통이 밤에 심해지고 원인 없이 체중이 빠진다면 정밀검사가 필요하다.",o:OX,a:0,v:"hosp",e:"감염·종양 등을 배제해야 하는 위험신호입니다. 반드시 진료받으세요."},
{c:"허리",q:"복부·등 코어 근력을 키우면 만성 요통 예방에 도움이 된다.",o:OX,a:0,v:"know",e:"코어가 척추를 지지해 재발을 줄여줍니다. 통증이 없을 때 꾸준히 하세요."},
{c:"허리",q:"젊은 사람에게는 허리 디스크가 생기지 않는다.",o:OX,a:1,v:"know",e:"20~40대에도 흔합니다. 나쁜 자세·무리한 동작이면 나이와 무관하게 생길 수 있습니다."},
{c:"허리",q:"요통이 있을 때 가벼운 걷기와 스트레칭은 대개 도움이 된다.",o:OX,a:0,v:"home",e:"통증 없는 범위의 가벼운 활동은 회복을 돕습니다. 무리한 동작은 피하세요."},
{c:"허리",q:"척추관협착증은 걸으면 다리가 저리고 아프다가 쉬면 나아지는 경향이 있다.",o:OX,a:0,v:"know",e:"신경성 파행이 특징입니다. 걷는 거리가 점점 짧아지면 진료를 받아보세요."},
{c:"허리",q:"허리를 삐끗한 뒤 한쪽 다리가 마비된 느낌이 오면 빨리 병원에 가야 한다.",o:OX,a:0,v:"hosp",e:"신경 손상 가능성이 있어 신속한 진료가 필요합니다."},
{c:"허리",q:"허리 통증은 자세·생활습관과 전혀 관련이 없다.",o:OX,a:1,v:"know",e:"자세, 앉는 습관, 운동 부족 등이 큰 영향을 줍니다."},

/* ---------- 로직 ---------- */
const app = document.getElementById('app');
const PER_GAME = 10;
let quiz=[], idx=0, score=0, answered=false, visitFlags=0;

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]]}return a}

    <div class="chips">
      <span class="chip">허리·디스크</span><span class="chip">목·거북목</span><span class="chip">오십견·어깨</span>

    </div>
    <div class="disclaim">본 퀴즈는 건강 상식을 위한 <b>교육용</b>이며, 의학적 진단이 아닙니다. 실제 증상은 반드시 의료진의 진찰을 받으세요.</div>
    <button class="btn btn-primary" id="start">10문제 시작하기</button>
  </div>`;
  document.getElementById('start').onclick=startGame;
}

function startGame(){
  quiz = shuffle([...BANK]).slice(0,PER_GAME);
  idx=0; score=0; visitFlags=0;
  renderQ();
}

function renderQ(){
  answered=false;
  const item=quiz[idx];
  const pct=(idx)/PER_GAME*100;
  app.innerHTML=`
    <div class="topbar">
      <span class="qcount"><b>${idx+1}</b> / ${PER_GAME}</span>
      <span class="score-pill">정답 ${score}</span>
    </div>
    <div class="bar"><i style="width:${pct}%"></i></div>
    <div class="card qcard">
      <span class="cat">${item.c}</span>
      <p class="qtext">${item.q}</p>
      <div class="opts" id="opts">
        ${item.o.map((t,i)=>`<button class="opt" data-i="${i}"><span class="mk">${i===0?'O':'X'}</span>${t.replace(/^[^\s]+\s/,'')}</button>`).join('')}
      </div>
      <div id="feedback"></div>
    </div>`;
  requestAnimationFrame(()=>{document.querySelector('.bar > i').style.width=(idx+.15)/PER_GAME*100+'%';});
  document.querySelectorAll('.opt').forEach(b=>b.onclick=()=>choose(+b.dataset.i,b));
}

function choose(i,btn){
  if(answered) return; answered=true;
  const item=quiz[idx];
  const correct=(i===item.a);
  if(correct) score++;
  if(item.v==='hosp') visitFlags++;
  document.querySelectorAll('.opt').forEach((b,bi)=>{
    b.disabled=true;
    if(bi===item.a) b.classList.add('correct');
    else if(bi===i) b.classList.add('wrong');
  });
  const isHosp=item.v==='hosp', isHome=item.v==='home';
  const tag = isHosp ? `<span class="tag-visit hosp">🏥 이럴 땐 병원 방문</span>`
            : isHome ? `<span class="tag-visit home">🏠 우선 집에서 관리 가능</span>` : '';
  document.getElementById('feedback').innerHTML=`
    <div class="exp ${correct?'good':'bad'}">
      <span class="verdict">${correct?'정답이에요! ✅':'아쉬워요 ❌'}</span>
      <span class="body">${item.e}</span><br>${tag}
    </div>
    <button class="btn btn-next" id="next">${idx+1<PER_GAME?'다음 문제 →':'결과 보기 →'}</button>`;
  document.getElementById('next').onclick=()=>{
    if(idx+1<PER_GAME){idx++;renderQ();document.querySelector('.wrap').scrollIntoView({behavior:'smooth',block:'start'});}
    else renderResult();
  };
}

function renderResult(){
  let tier,msg;
  if(score>=9){tier="근골격계 건강 지식 만렙!";msg="통증 신호를 잘 이해하고 계시네요. 다만 아는 것과 내 몸은 다릅니다. 실제 통증이 있다면 참지 말고 진료로 정확히 확인하세요.";}
  else if(score>=6){tier="꽤 잘 알고 계세요 👍";msg="기본기는 탄탄합니다. 애매한 부분이 있었다면, 내 통증의 원인은 진찰로 확인하는 게 가장 정확해요.";}
  else if(score>=3){tier="오해하고 있던 상식이 있네요";msg="잘못 알고 있으면 통증을 키우기 쉽습니다. 지금 아픈 곳이 있다면 자가관리에만 기대지 말고 진료를 받아보세요.";}
  else {tier="통증 신호, 놓치기 쉬워요 ⚠️";msg="통증은 몸의 경고입니다. 제때 치료하지 못한 통증은 삶의 질을 떨어뜨립니다. 신경 쓰이는 증상이 있다면 진료를 권합니다.";}

  const extra = visitFlags>=4
    ? `<p class="rmsg" style="margin-top:10px;color:var(--warn);font-weight:700">이번 문제 중 '병원 방문 신호'에 해당하는 항목이 많았어요. 비슷한 증상이 실제로 있다면 진료를 미루지 마세요.</p>`
    : '';

  app.innerHTML=`
    <div class="card result">
      <p class="rscore">10문제 중</p>
      <div class="rbig">${score}<span>/10</span></div>
      <h2 class="rtier">${tier}</h2>
      <p class="rmsg">${msg}</p>
      ${extra}
      <div class="redflag">
        <h3>🚨 이런 신호는 바로 진료하세요</h3>
        <ul>
          <li>팔·다리로 뻗치는 저림 + 힘 빠짐(근력저하)</li>
          <li>대소변 조절 장애, 회음부 감각 저하 → 응급</li>
          <li>통증 부위 발열·부종 또는 원인 없는 체중감소</li>
          <li>외상 후 심한 통증·변형, 체중을 실을 수 없음</li>
          <li>자가관리에도 2주 이상 낫지 않거나 점점 악화</li>
        </ul>
      </div>
      <div class="clinic">
        <div class="clinic-hd">
          <div class="cn">월성마디안의원</div>
          <div class="cs">대구 달서구 · 정형외과 · 마취통증의학과</div>
        </div>
        <div class="clinic-bd">
          <p class="clinic-slogan">우수한 장비와 정확한 진단으로,<br>빠르고 재발 없는 통증 치료를 돕습니다.</p>
          <div class="clinic-sec-t">진료 분야</div>
          <div class="clinic-chips">
            <span>비수술 척추치료</span><span>관절 클리닉</span><span>자세교정 클리닉</span><span>영양주사</span>
          </div>
          <div class="clinic-sec-t">치료 방법</div>
          <div class="clinic-chips">
            <span>체외충격파</span><span>신경차단술</span><span>도수·운동치료</span><span>증식치료(프롤로)</span><span>관절강내주사</span>
          </div>
          <div class="clinic-info">
            <div class="clinic-row"><span class="ic">📍</span><span>대구광역시 달서구 조암로 29, 이래타워 3층 304·305호</span></div>
            <div class="clinic-row"><span class="ic">📞</span><span><a href="tel:0536411233">053-641-1233</a></span></div>
            <div class="clinic-row"><span class="ic">🕒</span><span><b>월·수·금</b> 10:00~19:00 &nbsp;/&nbsp; <b>화·목</b> 10:00~20:30 (야간진료)<br><b>토·일</b> 09:00~14:00 (점심시간 없음) &nbsp;/&nbsp; 평일 점심 13:00~14:00<br>공휴일 휴진</span></div>
          </div>
          <div class="clinic-cta">
            <a class="cta-call" href="tel:0536411233">📞 전화 상담</a>
            <a class="cta-book" href="https://madian.co.kr" target="_blank" rel="noopener">온라인 예약 →</a>
          </div>
        </div>
      </div>
      <button class="btn btn-retry" id="again">🔄 다른 10문제 다시 풀기</button>
      <p class="foot-note">본 퀴즈는 교육용 건강 정보이며 진단·치료를 대체하지 않습니다.<br>정확한 진단과 치료는 월성마디안의원에서 상담하세요.</p>
    </div>`;
  document.getElementById('again').onclick=()=>{startGame();document.querySelector('.wrap').scrollIntoView({behavior:'smooth',block:'start'});};
}

renderIntro();
